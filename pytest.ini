[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = -v --tb=short --strict-markers
markers =
    unit: fast, no I/O, no mocked network — pure logic tests
    integration: uses FastAPI TestClient, in-memory DB, mocked external services
    slow: tests that take noticeably longer (bulk scans, report generation)
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*