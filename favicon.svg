<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded tile so the gold mark has contrast in light AND dark browser chrome -->
  <rect width="64" height="64" rx="14" fill="#10141F"/>
  <!-- faint connecting ring -->
  <circle cx="32" cy="31" r="19" fill="none" stroke="#D8A85F" stroke-width="1.4" opacity="0.30"/>
  <!-- eight nodes forming the "Q" ring (thicker than the nav logo for small-size legibility) -->
  <circle cx="32" cy="12"   r="3.4" fill="#D8A85F"/>
  <circle cx="45.4" cy="17.6" r="3.4" fill="#D8A85F"/>
  <circle cx="51"   cy="31"   r="3.4" fill="#D8A85F"/>
  <circle cx="45.4" cy="44.4" r="3.4" fill="#D8A85F"/>
  <circle cx="18.6" cy="17.6" r="3.4" fill="#D8A85F"/>
  <circle cx="13"   cy="31"   r="3.4" fill="#D8A85F"/>
  <circle cx="18.6" cy="44.4" r="3.4" fill="#D8A85F"/>
  <circle cx="32"   cy="50"   r="3.4" fill="#D8A85F"/>
  <!-- the Q tail: brighter, larger node breaking out at lower-right -->
  <circle cx="47.5" cy="47.5" r="4.6" fill="#ECC07A"/>
</svg>
